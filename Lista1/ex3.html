<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercício Bootstrap 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .row {
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <form>
        <div class="container">
            <div class="row">
                <div class="col-3">
                    <label for="name" class="form-label">Partner Name</label>
                </div>
                <div class="col-3">
                    <input type="text" class="form-control id=name" required>
                </div>
                <div class="col-3">
                    <label for="email" class="form-label">Partner Email ID</label>
                </div>
                <div class="col-3">
                    <input type="email" class="form-control id=email" required>
                </div>
            </div>

            <div class="row">
                <div class="col-3">
                    <label for="name2" class="form-label">Partner Legal Name</label>
                </div>
                <div class="col-3">
                    <input type="text" class="form-control id=name" required>
                </div>
                <div class="col-3">
                    <label for="mobile" class="form-label">Partner Mobile</label>
                </div>
                <div class="col-3">
                    <input type="text" class="form-control id=mobile" required>
                </div>
            </div>

            <div class="row">
                <div class="col-3">
                    <label for="adress" class="form-label">Partner Adress</label>
                </div>
                <div class="col">
                    <textarea class="form-control" id="adress" required></textarea>
                </div>
            </div>

            <div class="row">
                <div class="col-3">
                    <label id="data_inicio" class="form-label">Contract Start Date</label>
                </div>
                <div class="col-3">
                    <input type="date" class="form-control" id="data_inicio" placeholder="Date Start" required>
                </div>
                <div class="col-3">
                    <label id="data_fim" class="form-label">Contract Expire Date</label>
                </div>
                <div class="col-3">
                    <input type="date" class="form-control" id="data_fim" placeholder="Date End" required>
                </div>
            </div>

            <div class="row">
                <div class="col-3">
                    <label id="emprestimo_min" step="any" class="form-label">Minimum Loan Amount</label>
                </div>
                <div class="col-3">
                    <input type="number" class="form-control" id="emprestimo_min" required>
                </div>
                <div class="col-3">
                    <label id="emprestimo_max" step="any" class="form-label">Maximun Loan Amount</label>
                </div>
                <div class="col-3">
                    <input type="number" class="form-control" id="emprestimo_max" required>
                </div>
            </div>

            <div class="row">
                <div class="col-3">
                    <label id="juros" class="form-label">Interest Rate</label>
                </div>
                <div class="col-3">
                    <input type="number" id="juros" class="form-control" step="any" min="0" max="100" required>
                </div>
                <div class="col-3">
                    <label id="deposito" step="any" class="form-label">Deposit Amount</label>
                </div>
                <div class="col-3">
                    <input type="number" class="form-control" id="deposito" required>
            </div>

            <div style="display: flex; justify-content: center; margin-top: 5px;">
                    <input type="submit" value="Save" class="btn btn-primary">
            </div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                crossorigin="anonymous"></script>
        </div>
    </form>
</body>

</html>
