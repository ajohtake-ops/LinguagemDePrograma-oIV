<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercício 5 Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .row {
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <form>
        <div class="container">

            <div class="row">
                <div class="col">
                    <label for="nome" class="form-label">Nome:</label>
                    <input type="text" class="form-control" id="nome" placeholder="Informe o nome" required>  
                </div>
            </div>

            <div class="row">
                <div class="col-md-2">
                    <label for="cpf" class="form-label">CPF:</label>
                    <input type="number" class="form-control" id="cpf" placeholder="Informe o CPF" maxlength="11" required>
                </div>
                <div class="col">
                    <label class="form-label" for="endereco">Endereço:</label>
                    <input type="text" class="form-control" id="endereco" placeholder="Informe o endereço" required>
                </div>
                <div class="col-md-2">
                    <label for="nivel" class="form-label">Nível:</label>
                    <select class="form-select" aria-label="status" required>
                        <option selected>-</option>
                        <option value="1">0</option>
                        <option value="2">1</option>
                        <option value="3">2</option>
                        <option value="4">3</option>
                        <option value="5">4</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label class="form-label" for="email">Email:</label>
                    <input type="email" class="form-control" placeholder="Informe o email" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="senha">Senha:</label>
                    <input class="form-control" id="senha" type="password" placeholder="Informe a senha" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label" for="status">Status</label>
                    <select class="form-select" aria-label="status" required>
                        <option selected>-</option>
                        <option value="1">Solteiro(a)</option>
                        <option value="2">Namorando</option>
                        <option value="3">Noivo(a)</option>
                        <option value="4">Casado(a)</option>
                        <option value="5">Viúvo(a)</option>
                    </select>
                </div>
            </div>

            <div class="row" style="float: right; margin-top: 10px;;">
                <div class="col">
                    <input class="btn btn-success" type="submit" value="Enviar" required>
                </div>
                <div class="col">
                    <input class="btn btn-outline-secondary" type="reset" value="Cancelar" required>
                </div>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                crossorigin="anonymous"></script>
        </div>
    </form>
</body>

</html>
