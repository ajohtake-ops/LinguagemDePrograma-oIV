<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exercício 1 Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <div class="container">

    <div class="row">
      <div class="col">
        <label for="nome" class="form-label">Last Name</label>
        <input type="text" id="nome" name="nome" class="form-control" placeholder="Pedro" required="">
      </div>
      <div class="col">
        <label for="sobrenome" class="form-label">First Name</label>
        <input type="text" id="sobrenome" name="sobrenome" class="form-control" placeholder="Silva" required="">
      </div>
      <div class="col">
        <label for="username" class="form-label">Username</label>
        <div class="input-group mb-3">
          <span class="input-group-text" id="basic-addon1">@</span>
          <input type="text" name="username" id="username" class="form-control" placeholder="Username"
            aria-label="Username" aria-describedby="basic-addon1">
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <label for="city" class="form-label">City</label>
        <input type="text" id="city" name="city" class="form-control" placeholder="Presidente Prudente" required="">
      </div>
      <div class="col">
        <label for="state" class="form-label">State</label>
        <input type="text" id="state" name="state" class="form-control" placeholder="São Paulo" required="">
      </div>
      <div class="col">
        <label for="zip" class="form-label">ZIP</label>
        <input type="number" id="zip" name="zip" class="form-control" placeholder="00000000" required="">
      </div>
    </div>

    <div class="col" style="margin-top: 10px; margin-bottom: 10px;">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="" id="checkDefault">
        <label class="form-check-label" for="checkDefault">
          Agree to terms and conditions
        </label>
      </div>
    </div>

    <div>
      <button type="submit" class="btn btn-primary">Submit form</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
  </div>
</body>

</html>
